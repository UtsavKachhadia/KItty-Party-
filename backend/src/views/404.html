<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page not found</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: #fff;
      color: #0f172a;
    }
    .code {
      font-size: 88px;
      font-weight: 500;
      color: #f1f5f9;
      line-height: 1;
      letter-spacing: -4px;
      margin-bottom: 8px;
      user-select: none;
    }
    .divider {
      width: 40px;
      height: 2px;
      background: #e2e8f0;
      border-radius: 2px;
      margin-bottom: 20px;
    }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
    p  { font-size: 13px; color: #64748b; max-width: 320px; line-height: 1.6; text-align: center; }
    .status { font-size: 12px; min-height: 20px; margin: 16px 0; text-align: center; }
    .actions { display: flex; gap: 10px; margin-top: 8px; }
    button {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
    }
    #retryBtn {
      border: 0.5px solid #e2e8f0;
      background: #f8fafc;
      color: #374151;
    }
    #retryBtn:disabled { opacity: 0.55; cursor: default; }
    #homeBtn {
      border: none;
      background: #0f172a;
      color: #fff;
      font-weight: 500;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <div class="divider"></div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Check the URL or head back home.</p>
  <div class="status" id="status"></div>
  <div class="actions">
    <button id="retryBtn" onclick="handleRetry()">
      <svg id="retryIcon" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1.5 7A5.5 5.5 0 0 1 12.3 4M12.5 7a5.5 5.5 0 0 1-10.8 3"
          stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M11 1.5v3h-3"
          stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 9.5H0"
          stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span id="retryLabel">Try again</span>
    </button>
    <button id="homeBtn" onclick="window.location.href='/'">Go home</button>
  </div>

  <script>
    let retrying = false
    let retryCount = 0

    function handleRetry() {
      if (retrying) return
      retrying = true

      const btn   = document.getElementById('retryBtn')
      const icon  = document.getElementById('retryIcon')
      const label = document.getElementById('retryLabel')
      const msg   = document.getElementById('status')

      btn.disabled = true
      label.textContent = 'Retrying...'
      icon.classList.add('spinning')
      msg.textContent = ''
      msg.style.color = '#94a3b8'

      setTimeout(() => {
        retryCount++
        btn.disabled = false
        label.textContent = 'Try again'
        icon.classList.remove('spinning')
        retrying = false

        if (retryCount >= 2) {
          msg.textContent = 'Still not found. The page may have moved or been deleted.'
          msg.style.color = '#92400e'
        } else {
          msg.textContent = 'Page still not found.'
        }
      }, 1400)
    }
  </script>
</body>
</html>
